name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Init npm
        run: npm init -y
      - name: Install Capacitor
        run: npm install @capacitor/core@5.7.0 @capacitor/android@5.7.0 @capacitor/cli@5.7.0
      - name: Copy files to www/
        run: |
          mkdir -p www/icons
          cp index.html manifest.json sw.js www/
          cp icons/*.png www/icons/
      - name: Create Capacitor config
        run: |
          echo '{"appId":"com.quixoteclub.pallankuzhi","appName":"Pallankuzhi","webDir":"www","server":{"androidScheme":"https"},"android":{"backgroundColor":"#0a0300"}}' > capacitor.config.json
      - name: Add Android & sync
        run: |
          npx cap add android
          npx cap sync android
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pallankuzhi-debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
