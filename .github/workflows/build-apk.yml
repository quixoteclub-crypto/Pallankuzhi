name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Init npm
        run: npm init -y
      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/android @capacitor/cli
      - name: Copy files to www/
        run: |
          mkdir -p www/icons
          cp index.html manifest.json sw.js www/
          cp icons/*.png www/icons/
      - name: Create Capacitor config
        run: |
          echo '{"appId":"com.quixoteclub.pallankuzhi","appName":"Pallankuzhi","webDir":"www","server":{"androidScheme":"https"},"android":{"backgroundColor":"#0a0300"}}' > capacitor.config.json
      - name: Add Android & sync
        run: |
          npx cap add android
          npx cap sync android
      - name: Add google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
      - name: Fix Kotlin stdlib conflict
        run: |
          cat >> android/app/build.gradle << 'EOF'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.10'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.10'
              }
          }
          EOF
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Pallankuzhi v${{ github.run_number }}
          body: |
            🐚 Pallankuzhi Android APK
            Built automatically from latest code.
            Download and install the APK below.
          files: android/app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: false
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
