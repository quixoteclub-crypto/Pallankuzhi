    <p>An ancient Tamil board game of sowing, strategy, and capture. Play against AI or a friend directly in your browser — no download needed.</p>
    <p>Pallankuzhi is a traditional two-player mancala-style game from Tamil Nadu, India. Players sow cowrie shells across 14 pits and use strategy to capture their opponent's seeds and win.</p>
    <p>Features: Play vs AI, Play vs Friend (PvP), 3 shell count modes (6, 12, 24 shells), animated board, sound effects, and full mobile support.</p>

const { useState, useEffect, useRef, useCallback } = React;

/* =============================================================
   Fix #15 — VARIABLE NAME LEGEND
   All short/obfuscated names explained here for maintainability.
   ---------------------------------------------------------------
   HOOKS
     _ula()        → useLiveAnnouncer   — returns [announceText, announce(text)]
                     for screen-reader aria-live updates
     _uprm()       → usePrefersReducedMotion — returns bool from media query

   AUDIO
     _ca()         → createAudio — builds and returns the sfx engine object

   GAME CONSTANTS
     _FH           → forbiddenHole (index 3)  — player 0's forbidden pit
     _FA           → forbiddenAlt  (index 10) — player 1's forbidden pit
     OVAL          → the 14-pit traversal order (0→6, then 13→7)
     _oix          → ovalIndex map — pit number → position in OVAL array
     _FH/_FA pits hold shells that may be claimed at game end

   GAME LOGIC FUNCTIONS
     _ib(count)    → initBoard — returns a fresh 14-pit board with `count` shells each
     _lm(b, p)     → legalMoves — returns playable pit indices for player p
     _st(b,s,p,c)  → simulateTurn — returns animation steps for a move from pit s
     _aiB(b, c)    → aiBestMove — greedy AI: picks highest-scoring legal move
     _pf           → pitsBeforeForbidden — array of pits one step before each forbidden pit
                     (relay stops here)
     _ppf          → pitsTwoBeforeForbidden — two steps before each forbidden pit
     _cf           → capturedForbidden — which forbidden pit was "entered" this turn

   COMPONENT SHORTHANDS
     _PS           → PitShells — SVG cowrie layout renderer inside each pit
     _RH           → RenderHand — the emoji hand (✊ / 🫳) shown during animation
     _HOB          → HandOverBoard — positions _RH over the active pit
     _FS           → FlySeeds — animates shells flying from hand to pit (FlyArc)
     _KBH          → KolamBorderHeader — decorative SVG border strip
     _L8           → Lotus8 — 8-petal SVG lotus decoration on the board border
     _L6           → Lotus6 — 6-petal SVG lotus decoration on the board border
     _DU           → DiamondUnit — diamond SVG decoration on the board border

   COMPONENT STATE (inside Pallankuzhi)
     _br           → busyRef — ref flag: true while animation is running
     _tr           → timerRef — ref to the current step setTimeout handle
     _fsi          → flySeedException — incrementing ID for FlyArc events
     _llp          → lastLandedPit — ref tracking which pit the hand is over
     _fc           → forbiddenClaimants — tracks which players "entered" each forbidden pit
     _hc           → humanColumn — array [0..6], player 0's pit indices
     _ac           → aiColumn    — array [7..13], player 1's pit indices
     _mb           → mainBackground — dynamic board background color
     _mbd          → mainBorderColor — dynamic board border color
     _mc           → mainColor — dynamic board accent color
     _sra          → screenReaderAnnounce — current text for aria-live region
     _rm           → reducedMotion — bool from _uprm()

   ANIMATION CALLBACKS (inside Pallankuzhi)
     _rA           → runAnimation — steps through simulation steps with timing
     _hC           → handleClick — processes a pit click for a given player
     _finT         → finishTurn — switches turn or ends game after move completes
     _endG         → endGame — tallies final scores including forbidden pit shells

   ONLINE / REFS
     _boardRef     → live ref mirror of board state (for _remoteMoveRef callback)
     _scoresRef    → live ref mirror of scores
     _turnRef      → live ref mirror of turn
     _overRef      → live ref mirror of over

     _rematchRef   → ref-based callback replacing window._onlineRematch

function _ula() {
  const [announce, setAnnounce] = useState("");
  const timerRef = useRef(null);
  const announce_ = useCallback((text) => {
    setAnnounce("");
    if(timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => setAnnounce(text), 50);
  }, []);
  // Clean up on unmount to avoid setState on unmounted component
  useEffect(() => () => { if(timerRef.current) clearTimeout(timerRef.current); }, []);
  return [announce, announce_];
}
function _uprm() {
  const mq = typeof window !== "undefined"
    ? window.matchMedia("(prefers-reduced-motion: reduce)")
    : { matches: false };
  const [reduced, setReduced] = useState(mq.matches);
  useEffect(() => {
    const handler = (e) => setReduced(e.matches);
    mq.addEventListener?.("change", handler);
    return () => mq.removeEventListener?.("change", handler);
  }, []);
  return reduced;
}
function _ca() {
  let ctx = null;
  const getCtx = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  };
  const _isMuted = () => !!window._sfxMuted;
  const env = (node, vol, atk, sus, rel) => {
    const t = getCtx().currentTime;
    node.gain.setValueAtTime(0, t);
    node.gain.linearRampToValueAtTime(vol, t + atk);
    node.gain.setValueAtTime(vol, t + atk + sus);
    node.gain.exponentialRampToValueAtTime(0.0001, t + atk + sus + rel);
  };
  return {
    pick() {
      if(_isMuted()) return;
      const c = getCtx(), t = c.currentTime;
      const g = c.createGain(); g.connect(c.destination);
      env(g, 0.9, 0.002, 0.04, 0.14);
      const osc = c.createOscillator();
      osc.type = "sine"; osc.frequency.setValueAtTime(340, t);
      osc.frequency.exponentialRampToValueAtTime(110, t + 0.14);
      osc.connect(g); osc.start(t); osc.stop(t + 0.2);
      const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.04), c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3);
      const src = c.createBufferSource(); src.buffer = buf;
      const ng = c.createGain(); ng.gain.setValueAtTime(0.6, t);
      src.connect(ng); ng.connect(c.destination); src.start(t);
    },
    sow() {
      if(_isMuted()) return;
      const c = getCtx(), t = c.currentTime;
      const g = c.createGain(); g.connect(c.destination);
      env(g, 0.6, 0.001, 0.012, 0.07);
      const osc = c.createOscillator();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(580 + Math.random() * 220, t);
      osc.frequency.exponentialRampToValueAtTime(280, t + 0.08);
      osc.connect(g); osc.start(t); osc.stop(t + 0.1);
    },
    relay() {
      if(_isMuted()) return;
      const c = getCtx(), t = c.currentTime;
      [0, 0.07, 0.14].forEach((dt, i) => {
        const g = c.createGain(); g.connect(c.destination);
        env(g, 0.6, 0.008, 0.06, 0.2);
        const osc = c.createOscillator();
        osc.type = "sine";
        const base = 480 + i * 180;
        osc.frequency.setValueAtTime(base, t + dt);
        osc.frequency.linearRampToValueAtTime(base * 1.55, t + dt + 0.22);
        osc.connect(g); osc.start(t + dt); osc.stop(t + dt + 0.3);
      });
    },
    capture(amount = 1) {
      if(_isMuted()) return;
      const c = getCtx(), t = c.currentTime;
      const count = Math.min(amount + 2, 9);
      for (let i = 0; i < count; i++) {
        const dt = i * 0.052;
        const g = c.createGain(); g.connect(c.destination);
        env(g, 0.75, 0.002, 0.05, 0.25);
        const osc = c.createOscillator();
        osc.type = "sine";
        const freq = 680 + i * 95 + Math.random() * 50;
        osc.frequency.setValueAtTime(freq, t + dt);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.65, t + dt + 0.28);
        osc.connect(g); osc.start(t + dt); osc.stop(t + dt + 0.32);
      }
    },
    win() {
      if(_isMuted()) return;
      const c = getCtx(), t = c.currentTime;
      [261.6, 329.6, 392, 523.3, 659.3, 784].forEach((freq, i) => {
        const dt = i * 0.09;
        const g = c.createGain(); g.connect(c.destination);
        env(g, 0.65, 0.01, 0.28, 0.55);
        const osc = c.createOscillator();
        osc.type = "triangle"; osc.frequency.setValueAtTime(freq, t + dt);
        osc.connect(g); osc.start(t + dt); osc.stop(t + dt + 0.9);
      });
    },
    lose() {
      if(_isMuted()) return;
      const c = getCtx(), t = c.currentTime;
      [523.3, 440, 369.9, 311.1, 261.6, 220].forEach((freq, i) => {
        const dt = i * 0.1;
        const g = c.createGain(); g.connect(c.destination);
        env(g, 0.55, 0.01, 0.22, 0.45);

        osc.type = "sine"; osc.frequency.setValueAtTime(freq, t + dt);
        osc.connect(g); osc.start(t + dt); osc.stop(t + dt + 0.65);
      });
    },
    draw() {
      if(_isMuted()) return;
      const c = getCtx(), t = c.currentTime;
      [392, 392].forEach((freq, i) => {

        const g = c.createGain(); g.connect(c.destination);

        osc.type = "sine"; osc.frequency.setValueAtTime(freq, t + dt);
        osc.connect(g); osc.start(t + dt); osc.stop(t + dt + 0.6);
      });
    },
    reset() {
      if(_isMuted()) return;
      const c = getCtx(), t = c.currentTime;
      const g = c.createGain(); g.connect(c.destination);
      env(g, 0.65, 0.015, 0.1, 0.3);
      const osc = c.createOscillator();
      osc.type = "sine";
      osc.frequency.setValueAtTime(180, t);
      osc.frequency.linearRampToValueAtTime(480, t + 0.2);
      osc.connect(g); osc.start(t); osc.stop(t + 0.45);
    },
    _introNodes: [],
    _introGain: null,
    startIntro() {
      if(_isMuted()) return;
      const c = getCtx();
      if (this._introGain) return;

      master.gain.setValueAtTime(0, c.currentTime);
      master.gain.linearRampToValueAtTime(0.55, c.currentTime + 2.5);
      master.connect(c.destination);
      this._introGain = master;
      this._introNodes = [];
      
      const droneFreqs = [110, 220, 330, 146.8];
      droneFreqs.forEach((freq, i) => {
        const o = c.createOscillator();
        o.type = "sine";
        o.frequency.setValueAtTime(freq, c.currentTime);
        const g2 = c.createGain();
        g2.gain.setValueAtTime(i === 0 ? 0.55 : i === 1 ? 0.3 : 0.12, c.currentTime);
        o.connect(g2); g2.connect(master);
        o.start(); this._introNodes.push(o);

      const shimmer = c.createOscillator();
      shimmer.type = "sine"; shimmer.frequency.setValueAtTime(440, c.currentTime);
      const shimG = c.createGain(); shimG.gain.setValueAtTime(0, c.currentTime);
      const lfo = c.createOscillator();
      lfo.type = "sine"; lfo.frequency.setValueAtTime(0.4, c.currentTime);
      const lfoG = c.createGain(); lfoG.gain.setValueAtTime(0.07, c.currentTime);
      lfo.connect(lfoG); lfoG.connect(shimG.gain);
      shimmer.connect(shimG); shimG.connect(master);
      shimmer.start(); lfo.start();
      this._introNodes.push(shimmer, lfo);
      
      const scale = [220, 247, 277, 330, 370, 440, 494, 554, 659, 740];
      const phrase = [0,2,4,5,4,2,1,0, 3,5,7,8,7,5,3,2, 4,6,8,9,8,6,4,3];
      let noteIdx = 0;
      const scheduleNote = () => {
        if (!this._introGain) return;
        const now = c.currentTime;
        const freq = scale[phrase[noteIdx % phrase.length]];
        noteIdx++;
        const g3 = c.createGain();
        g3.gain.setValueAtTime(0, now);
        g3.gain.linearRampToValueAtTime(0.65, now + 0.04);
        g3.gain.exponentialRampToValueAtTime(0.0001, now + 1.8);
        g3.connect(master);
        const o2 = c.createOscillator();
        o2.type = "triangle";
        o2.frequency.setValueAtTime(freq, now);
        o2.connect(g3); o2.start(now); o2.stop(now + 1.9);
        
        const g4 = c.createGain();
        g4.gain.setValueAtTime(0, now);
        g4.gain.linearRampToValueAtTime(0.22, now + 0.04);
        g4.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
        g4.connect(master);
        const o3 = c.createOscillator();
        o3.type = "sine"; o3.frequency.setValueAtTime(freq * 2, now);
        o3.connect(g4); o3.start(now); o3.stop(now + 1.3);

      const g = this._introGain;

        g.gain.cancelScheduledValues(0);

      osc.frequency.linearRampToValueAtTime(640, t + 0.15);

// Fix #3: Hard AI — full relay-chain simulation so chained captures are correctly valued.
// _simulateChain recursively follows relay turns from a given board state,
// accumulating the total gain across all legs of the turn.
const _simulateChain = (board, startPit, player, capAt, depth=0) => {
  if(depth > 20) return { totalGain: 0, finalBoard: board }; // safety cap
  const { steps, totalGain, finalBoard } = _st(board, startPit, player, capAt);
  // Fix #24: find the last relay step — it always appears just before the end step.
  // The old code used indexOf(s) === steps.length-2 which fails when capture/triple
  // steps are interleaved before the end, causing relay chains to be undervalued.
  const lastRelay = [...steps].reverse().find(s => s.type === "relay");
  const lastStep  = steps[steps.length - 1];
  if(lastRelay && lastStep && lastStep.type !== "end") {
    const next = _simulateChain(finalBoard, lastRelay.pit, player, capAt, depth+1);
    return { totalGain: totalGain + next.totalGain, finalBoard: next.finalBoard };
  }
  return { totalGain, finalBoard };
};

// Hard AI: 1-ply lookahead with full relay-chain awareness.
// Fix #19: the old loop kept calling findIndex on the same steps array each iteration,
// always finding the same relay step. Now uses _simulateChain which correctly recurses
// through every relay leg and accumulates the true total gain for the full turn.
const _aiHard = (board, capAt) => {
  const ms = _lm(board, 1);
  if (!ms.length) return -1;
  const scoreMove = (m) => {
    const { totalGain: chainGain, finalBoard: chainBoard } = _simulateChain(board, m, 1, capAt);
    let score = chainGain * 100;
    // Bonus if first leg involves a relay (rewards aggressive multi-leg turns)
    const { steps } = _st(board, m, 1, capAt);
    if(steps.some(s => s.type === "relay")) score += 30;
    // Subtract best reply the opponent can make after our full chain
    const oppMoves = _lm(chainBoard, 0);
    if(oppMoves.length > 0) {
      const oppBest = Math.max(...oppMoves.map(om => {
        const { totalGain: og } = _st(chainBoard, om, 0, capAt);
        return og;
      }));
      score -= oppBest * 80;
    }
    score += board[m]; // tie-break: prefer pits with more shells
    return score;
  };
  return ms.reduce((best, m) => scoreMove(m) > scoreMove(best) ? m : best, ms[0]);
};

              animation:`${isLandscape?"popIn":"popInPortrait"} 0.45s cubic-bezier(0.22,1,0.36,1) both`,
              background:"linear-gradient(145deg,#2a1002 0%,#1a0800 50%,#2e1204 100%)",
              border:`2px solid ${result==="win"?"#ffe050":result==="lose"?"#a04020":result==="waiting"?"#6a4a20":"#6a5020"}`,
              borderRadius:24,
              padding:isLandscape?"20px 32px 16px":"36px 40px 28px",
              display:"flex",
              flexDirection:isLandscape?"row":"column",
              alignItems:"center",
              gap:isLandscape?24:16,
              boxShadow:`0 0 60px ${result==="win"?"rgba(255,210,40,0.25)":result==="lose"?"rgba(160,60,20,0.25)":"rgba(100,80,20,0.2)"},0 24px 80px rgba(0,0,0,0.9)`,
              minWidth:isLandscape?"auto":260,
              maxWidth:isLandscape?"90vw":"85vw",
              maxHeight:"90vh",
              overflowY:"auto",
            }}>
            <div style={{fontSize:64,lineHeight:1,filter:"drop-shadow(0 4px 16px rgba(0,0,0,0.8))"}}>
              {result==="win"?"🏆":result==="lose"?(gameMode==="pvp"?"🎮":(gameMode==="online"||gameMode==="matchmaking")?"🌍":"🤖"):"🤝"}
            </div>
            <div style={{
              fontFamily:"Cinzel,serif",fontSize:28,fontWeight:700,letterSpacing:4,
              textAlign:"center",lineHeight:1.2,
              background:result==="win"
                ?"linear-gradient(135deg,#f6e070,#c87c10,#f0b830)"
                :result==="lose"
                ?"linear-gradient(135deg,#e07050,#a03010,#c05030)"
                :result==="waiting"
                ?"linear-gradient(135deg,#a09050,#605020,#908040)"
                :"linear-gradient(135deg,#c0b060,#807030,#b0a050)",
              WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",
              filter:"drop-shadow(0 2px 12px rgba(0,0,0,0.8))",
            }}>
              {result==="win"?(gameMode==="pvp"?"Player 1 Wins!":"You Win!"):result==="lose"?(gameMode==="pvp"?"Player 2 Wins!":(gameMode==="online"||gameMode==="matchmaking")?"Opponent Wins!":"AI Wins!"):result==="waiting"?"Rematch Requested":"It's a Draw!"}
            </div>
            <div style={{
              fontFamily:"Crimson Text,serif",fontSize:18,
              color:result==="win"?"#c8a040":result==="lose"?"#a06040":"#807040",
              letterSpacing:1,textAlign:"center",
            }}>
              {scores[0]} – {scores[1]}
            </div>
            <div style={{
              fontFamily:"Crimson Text,serif",fontSize:13,fontStyle:"italic",
              color:"#5a3810",textAlign:"center",
            }}>
              {(()=>{
                const io=gameMode==="online"||gameMode==="matchmaking";
                if(result==="win") return gameMode==="pvp"?"Player 1 claims the cowries!":io?"You claimed the cowries!":"The cowries have spoken in your favour.";
                if(result==="lose") return gameMode==="pvp"?"Player 2 claims the cowries!":io?"Your opponent claimed the cowries!":"The AI has mastered the ancient art.";
                return "A perfectly balanced game.";
              })()}
            </div>
            {fbUser&&gameMode!=="pvp"&&(result==="win"||result==="lose"||result==="draw")&&(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 16px",borderRadius:20,background:"rgba(255,200,40,0.1)",border:"1px solid rgba(200,160,30,0.4)"}}>
                  <span style={{fontSize:16}}>🪙</span>
                  <span style={{fontFamily:"Cinzel,serif",fontSize:12,color:"#ffe040",letterSpacing:1}}>+{result==="win"?50:result==="draw"?10:5} coins &nbsp;·&nbsp; +{result==="win"?80:result==="draw"?20:10} XP</span>
                </div>
                {streakBonus&&result==="win"&&(
                  <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 16px",borderRadius:20,background:"rgba(255,140,20,0.15)",border:"1px solid rgba(255,120,20,0.5)",animation:"pulse 0.6s ease"}}>
                    <span style={{fontSize:18}}>🔥</span>
                    <span style={{fontFamily:"Cinzel,serif",fontSize:12,color:"#ff9040",letterSpacing:1}}>{streakBonus.streak}-Win Streak! +{streakBonus.bonus} bonus</span>
                  </div>
                )}
                {result==="win"&&winStreak>0&&(
                  <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:16,background:"rgba(255,100,20,0.08)",border:"1px solid rgba(200,80,10,0.3)"}}>
                    <span style={{fontSize:14}}>🔥</span>
                    <span style={{fontFamily:"Crimson Text,serif",fontSize:12,color:"#c87040",fontStyle:"italic"}}>{winStreak} win streak</span>
                  </div>
                )}
              </div>
            )}
            <div style={{display:"flex",alignItems:"center",gap:10,width:"80%",margin:"4px 0"}}>
              <div style={{flex:1,height:1,background:"linear-gradient(90deg,transparent,rgba(180,120,30,0.4))"}}/>
              <span style={{fontSize:11,color:"rgba(200,140,30,0.5)"}}>◆</span>
              <div style={{flex:1,height:1,background:"linear-gradient(90deg,rgba(180,120,30,0.4),transparent)"}}/>
            </div>
            {result==="waiting" ? (
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
                <div style={{display:"flex",gap:8}}>
                  {[0,1,2].map(i=>(
                    <div key={i} style={{width:9,height:9,borderRadius:"50%",background:"#c8a040",
                      opacity:0.8,animation:`pulse ${0.8+i*0.25}s ease-in-out infinite`}}/>
                  ))}
                </div>
                <span style={{fontFamily:"Crimson Text,serif",fontSize:13,color:"#7a5a3a",fontStyle:"italic"}}>
                  Waiting for host…
                </span>
              </div>
            ) : (
            <button
              onClick={()=>{
                sfx.btnClick();
                if(gameMode==="online"||gameMode==="matchmaking"){
                  if(onlineRole==="host"){
                    // Host sends restart + sync to guest, then resets locally.
                    const freshBoard = _ib(shellCount);
                    _fc.current={ [_FH]: new Set(), [_FA]: new Set() };
                    if(connRef.current&&connRef.current.open){
                      connRef.current.send({type:"restart", shellCount});
                      // Send authoritative fresh board so guest syncs before reset animation
                      connRef.current.send({
                        type:"sync",
                        board: freshBoard,
                        scores: [0,0],
                        fcH: [],
                        fcA: [],
                      });
                    }
                    // Fix Bug 5: call reset() once — previously state was set manually here
                    // AND inside reset(), causing a double-render race with the sync send.
                    reset();
                    return;
                  } else {
                    // Guest requests rematch — disable button and wait for host restart.
                    // Fix #33: replace Play Again button text to show waiting state,
                    // and the host restart message will call reset() which clears result.
                    sendRematch();
                    setMsg("Waiting for host to restart…");
                    setResult("waiting"); // special state: hides Play Again, shows spinner
                    return;
                  }
                }
                setResult(null); reset();
              }}
              style={{
                padding:"14px 44px",borderRadius:30,
                fontFamily:"Cinzel,serif",fontSize:14,letterSpacing:4,textTransform:"uppercase",
                color:"#c8a040",cursor:"pointer",
                background:"linear-gradient(135deg,rgba(80,34,4,0.95),rgba(28,10,0,0.98))",
                border:"1.5px solid rgba(160,90,10,0.7)",
                boxShadow:"0 6px 28px rgba(0,0,0,0.7),0 0 20px rgba(160,100,8,0.15)",
                transition:"all 0.25s",
              }}
              onMouseEnter={e=>{e.currentTarget.style.color="#ffe060";e.currentTarget.style.borderColor="rgba(220,160,20,0.8)";}}
              onMouseLeave={e=>{e.currentTarget.style.color="#c8a040";e.currentTarget.style.borderColor="rgba(160,90,10,0.7)";}}
            >Play Again</button>
            )}
            <button
              onClick={()=>{sfx.pageBack();fullReset();setIntroStep(2);}}
              style={{
                padding:"10px 32px",borderRadius:30,
                fontFamily:"Cinzel,serif",fontSize:12,letterSpacing:3,textTransform:"uppercase",
                color:"#7a5a3a",cursor:"pointer",
                background:"transparent",
                border:"1.5px solid rgba(100,60,20,0.5)",
                boxShadow:"none",
                transition:"all 0.25s",
              }}
              onMouseEnter={e=>{e.currentTarget.style.color="#c87050";e.currentTarget.style.borderColor="rgba(180,80,30,0.7)";}}
              onMouseLeave={e=>{e.currentTarget.style.color="#7a5a3a";e.currentTarget.style.borderColor="rgba(100,60,20,0.5)";}}
            >⇄ Change Mode</button>
          </div>
        </div>
      )}
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Pallankuzhi />);</script>
