name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Init npm
        run: npm init -y
      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/android @capacitor/cli
      - name: Copy files to www/
        run: |
          mkdir -p www/icons
          cp index.html manifest.json sw.js www/
          cp icons/*.png www/icons/
      - name: Create Capacitor config
        run: |
          echo '{"appId":"com.quixoteclub.pallankuzhi","appName":"Pallankuzhi","webDir":"www","server":{"androidScheme":"https"},"android":{"backgroundColor":"#0a0300"}}' > capacitor.config.json
      - name: Add Android & sync
        run: |
          npx cap add android
          npx cap sync android
      - name: Print SHA-1 fingerprint
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android | grep SHA1
